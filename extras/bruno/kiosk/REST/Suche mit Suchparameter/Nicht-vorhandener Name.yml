info:
  name: Nicht-vorhandener Name
  type: http
  seq: 4

http:
  method: GET
  url: "{{restUrl}}?Name=Xxx"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: Name
      value: Xxx
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
