info:
  name: Neuer Kiosk
  type: http
  seq: 1

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    type: json
    data: |-
      {
          "name": "Kiosk-Zentrum",
          "email": "info@kiosk-zentrum.de",
          "ist_geoeffnet": true,
          "homepage": "https://kiosk-zentrum.de",
          "username": "kioskadmin",
          "betreiber": {
              "vorname": "Max",
              "nachname": "Mustermann",
              "geschlecht": "M"
          },
          "produkte": [
              {
                  "name": "Zeitschrift",
                  "preis": "3.50",
                  "waehrung": "EUR"
              }
          ]
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.headers.location
      operator: matches
      value: \/rest\/[1-9]\d*$
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5