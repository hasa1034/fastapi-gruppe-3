info:
  name: Neuer Kiosk mit ungültigen Daten
  type: http
  seq: 3

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    type: json
    data: |-
      {
          "name": "falscher_name",
          "email": "falsche_email@",
          "ist_geoeffnet": true,
          "homepage": "https://?!",
          "betreiber": {
              "vorname": "",
              "nachname": "M",
              "geschlecht": "X"
          },
          "produkte": [],
          "username": "test"
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Fehlermeldungen im Response Body', () => {
            const body = res.getBody();
            // Die Felder, die wir als fehlerhaft provozieren:
            const expectedFields = ['name', 'email', 'homepage', 'betreiber'];

            // FastAPI Validierung
            if (body.detail && Array.isArray(body.detail)) {
                expect(body.detail).to.be.an('array').that.is.not.empty;
                const errorLocations = body.detail.map(elem => elem.loc[1]);
                
                // Wir prüfen, ob unsere erwarteten Problemfelder in der Fehlermeldung auftauchen
                expectedFields.forEach(field => {
                    expect(errorLocations).to.include(field);
                });
            }
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "422"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.detail
      operator: isArray
    - expression: res.body.detail
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5