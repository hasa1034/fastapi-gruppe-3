info:
  name: Kiosk 30 mit falscher Versionsnummer ändern
  type: http
  seq: 2

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: If-Match
      value: "0"
  params:
    - name: id
      value: "30"
      type: path
  body:
    type: json
    data: |-
      {
          "name": "Kioskput",
          "email": "update@kiosk.de",
          "ist_geoeffnet": false,
          "homepage": "https://www.kiosk-neu.de"
      }
