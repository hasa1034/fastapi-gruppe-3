info:
  name: Nicht-vorhandenen Kiosk 999999 ändern
  type: http
  seq: 5

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: If-Match
      value: '"0"'
  params:
    - name: id
      value: "999999"
      type: path
  body:
    type: json
    data: |-
      {
          "name": "Kioskput",
          "email": "update@kiosk.de",
          "ist_geoeffnet": false,
          "homepage": "https://www.kiosk-neu.de"
      }
