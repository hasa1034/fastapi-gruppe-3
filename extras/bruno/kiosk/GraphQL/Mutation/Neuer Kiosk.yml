info:
  name: Neuer Kiosk
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      mutation {
        create(
          kioskInput: {
            name: "falsNachnamegraphq"
            email: "testgraphql@test.graphql"
            istGeoeffnet: true
            homepage: "https://?!"
            username: "testgraphql"
            betreiber: {
              vorname: ""
              nachname: "M"
              geschlecht: MAENNLICH
            }
            produkte: [
              {
                name: "A"
                preis: "-1.00"
                waehrung: "EU"
              }
            ]
          }
        ) {
          id
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.create.id
      operator: gte
      value: "0"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
