info:
  name: Neuer Kiosk mit ungültigen Daten
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      mutation {
        create(
          kioskInput: {
            name: "falscher_name"
            email: "falsche_email@"
            istGeoeffnet: true
            homepage: "https://?!"
            username: "testgraphql"
            betreiber: {
              vorname: ""
              nachname: "M"
              geschlecht: MAENNLICH
            }
            produkte: [
              {
                name: "A"
                preis: "-1.00"
                waehrung: "EU"
              }
            ]
          }
        ) {
          id
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.errors
      operator: isArray
    # Falls dein Backend alle Fehler in einer Nachricht sammelt:
    - expression: res.body.errors[0].message
      operator: contains
      value: name
    - expression: res.body.errors[0].message
      operator: contains
      value: email
    - expression: res.body.errors[0].message
      operator: contains
      value: homepage
    - expression: res.body.errors[0].message
      operator: contains
      value: betreiber
    - expression: res.body.errors[0].message
      operator: contains
      value: produkte
    - expression: res.body.errors[0].path
      operator: isArray
    - expression: res.body.errors[0].path[0]
      operator: eq
      value: create

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5