info:
  name: Suche id, version, ... eines Kiosks anhand der Emailadresse
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      query ($email: String = "admin@acme.com") {
        kioske(suchparameter: {email: $email}) {
          id
          version
          name
          email
          istGeoeffnet
          homepage
          username
          betreiber {
            vorname
            nachname
            geschlecht
          }
          produkte {
            name
            preis
            waehrung
          }
        }
      }
    variables: |-
      {
        "email": "admin@acme.com"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.kioske
      operator: isArray
    - expression: res.body.data.kioske
      operator: length
      value: "1"
    - expression: res.body.data.kioske[0]
      operator: isJson
    - expression: res.body.data.kioske[0].id
      operator: gte
      value: "1000"
    - expression: res.body.data.kioske[0].version
      operator: gte
      value: "0"
    - expression: res.body.data.kioske[0].name
      operator: isString
    - expression: res.body.data.kioske[0].name
      operator: isNotEmpty
    - expression: res.body.data.kioske[0].istGeoeffnet
      operator: isBoolean
    - expression: res.body.data.kioske[0].homepage
      operator: isString
    - expression: res.body.data.kioske[0].betreiber
      operator: isJson
    - expression: res.body.data.kioske[0].betreiber.nachname
      operator: isString
    - expression: res.body.data.kioske[0].produkte
      operator: isArray
    - expression: res.body.data.kioske[0].username
      operator: isString
    - expression: res.body.data.kioske[0].username
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5