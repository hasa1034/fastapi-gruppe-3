info:
  name: Suche id, version, ... eines Kiosks mit Namen
  type: graphql
  seq: 6

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      query ($name: String = "Kiosk") {
        kioske(suchparameter: {name: $name}) {
          id
          version
          name
          email
          istGeoeffnet
          homepage
          username
          betreiber {
            vorname
            nachname
            geschlecht
          }
          produkte {
            name
            preis
            waehrung
          }
        }
      }
    variables: |-
      {
        "name": "Kiosk"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Body mit den Properties', () => {
          res.getBody()
            .data
            .kioske
            .forEach(kiosk => {
              const { id, version, name, email, istGeoeffnet, homepage, username, betreiber, produkte } = kiosk;
              expect(id).to.be.gte(0);
              expect(version).to.be.gte(0);
              expect(name).to.be.a('string');
              expect(email).to.be.a('string');
              expect(istGeoeffnet).to.be.a('boolean');
              expect(homepage).to.be.a('string');
              expect(username).to.be.a('string');
              expect(betreiber).to.be.an('object');
              expect(produkte).to.be.an('array');
            });
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.kiosken
      operator: isArray
    - expression: res.body.data.kiosken
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5