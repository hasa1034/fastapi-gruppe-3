info:
  name: Suche name von einem Kiosk mit nicht-vorhandener ID 999999
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      {
        kiosk(kioskId: "999999") {
          name
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.kiosk
      operator: isNull

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
