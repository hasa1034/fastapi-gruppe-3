info:
  name: Suche Name, E-Mail, ... des Kiosks mit ID 20
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      query ($kioskId: ID! = "20") {
        kiosk(kioskId: $kioskId) {
          id
          version
          name
          email
          istGeoeffnet
          homepage
          username
          betreiber {
            vorname
            nachname
            geschlecht
          }
          produkte {
            name
            preis
            waehrung
          }
        }
      }
    variables: |-
      {
        "kioskId": "20"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.kiosk
      operator: isJson
    - expression: res.body.data.kiosk.version
      operator: gte
      value: "0"
    - expression: res.body.data.kiosk.name
      operator: isString
    - expression: res.body.data.kiosk.name
      operator: isNotEmpty
    - expression: res.body.data.kiosk.email
      operator: isString
    - expression: res.body.data.kiosk.email
      operator: isNotEmpty
    - expression: res.body.data.kiosk.istGeoeffnet
      operator: isBoolean
    - expression: res.body.data.kiosk.homepage
      operator: isString
    - expression: res.body.data.kiosk.betreiber
      operator: isJson
    - expression: res.body.data.kiosk.betreiber.nachname
      operator: isString
    - expression: res.body.data.kiosk.produkte
      operator: isArray
    - expression: res.body.data.kiosk.username
      operator: isString
    - expression: res.body.data.kiosk.username
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5